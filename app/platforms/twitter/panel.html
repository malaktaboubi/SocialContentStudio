<div class="tw-panel">
    <div class="tw-card">
        <h2>Create a Tweet</h2>
        <p class="tw-sub">Speak your thoughts and generate a punchy Tweet with a matching AI image.</p>

        <div class="tw-tone-row">
            <label for="twToneSelect" class="tw-label">Tone / style</label>
            <select id="twToneSelect" class="tw-input"></select>
        </div>

        <div class="tw-record-section">
            <div class="tw-record-ring">
                <svg class="tw-record-ring-svg" viewBox="0 0 148 148">
                    <circle class="tw-record-ring-track" cx="74" cy="74" r="65"></circle>
                    <circle class="tw-record-ring-arc" cx="74" cy="74" r="65" id="twRingArc"></circle>
                </svg>
                <button id="twRecordBtn" type="button" class="tw-record-button">
                    <span id="twBtnIcon">⏺</span>
                </button>
            </div>

            <div class="tw-record-label">
                <span id="twBtnText">Start Recording</span>
                <span id="twTimer" class="tw-timer" style="display:none;">0:00</span>
            </div>

            <div id="twStatusBox" class="tw-status-box">
                <div id="twStatusText"></div>
            </div>
        </div>
    </div>

    <div class="tw-card tw-processing-card" id="twProcessingCard">
        <div class="tw-progress-bar-track">
            <div class="tw-progress-bar-fill" id="twProgressBarFill" style="width: 0%"></div>
        </div>
        <div class="tw-progress-meta">
            <span id="twProgressMessage">Starting…</span>
            <span id="twProgressPercent">0%</span>
        </div>
        <div id="twTranscriptSection" class="tw-transcript-section" style="display:none;">
            <div class="tw-label">Heard:</div>
            <div id="twTranscriptText" class="tw-transcript-text"></div>
        </div>
    </div>

    <div class="tw-card tw-post-card" id="twPostCard">
        <div id="twPostCardBody">
            <div class="tw-post-meta">
                <span class="tw-user-name">User</span>
                <span class="tw-user-handle">@voice_ai</span>
            </div>

            <label class="tw-label" for="twEditBody">Tweet</label>
            <textarea class="tw-input tw-post-field" id="twEditBody" rows="5" maxlength="280"></textarea>

            <details class="tw-image-prompt-details">
                <summary>Edit Image Prompt</summary>
                <textarea class="tw-input tw-post-field" id="twEditImagePrompt" rows="3"></textarea>
            </details>

            <div class="tw-regen-row">
                <button type="button" class="tw-btn-secondary" id="twRegenTextBtn">↻ Regenerate text</button>
                <button type="button" class="tw-btn-secondary" id="twRegenImageBtn">↻ Regenerate image</button>
            </div>

            <div class="tw-post-image-wrap">
                <img class="tw-post-image" id="twPostImage" src="" alt="Generated visual" style="display:none;">
            </div>
            
            <button type="button" class="tw-btn" id="twCopyBtn">Copy Tweet</button>
        </div>
    </div>
</div>
