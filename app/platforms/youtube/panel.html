<div class="yt-panel">
    <div class="yt-card">
        <h2>YouTube thumbnail generator</h2>
        <p class="yt-sub">Upload an audio or video file. We'll transcribe it, write a clickbait title, iteratively generate a matching thumbnail, and extract hashtags.</p>

        <label class="yt-label" for="ytFileInput">Audio or video file</label>
        <input type="file" id="ytFileInput" class="yt-input" accept="audio/*,video/*">

        <button id="ytGenerateBtn" class="yt-btn" disabled>Generate</button>
        <p id="ytStatus" class="yt-status" aria-live="polite"></p>
    </div>

    <div id="ytResultCard" class="yt-card" hidden>
        <h2>Result</h2>

        <label class="yt-label">Title</label>
        <div id="ytTitle" class="yt-output yt-title"></div>

        <label class="yt-label" style="margin-top:14px;">Thumbnail</label>
        <img id="ytThumb" class="yt-thumb-image" alt="Generated thumbnail">

        <label class="yt-label" style="margin-top:14px;">Hashtags</label>
        <div id="ytHashtags" class="yt-output yt-tags"></div>

        <label class="yt-label" style="margin-top:14px;">BLIP caption (what the image shows)</label>
        <div id="ytCaption" class="yt-output"></div>

        <label class="yt-label" style="margin-top:14px;">Alignment scores</label>
        <div id="ytScores" class="yt-output yt-thumb"></div>

        <button id="ytCopyBtn" class="yt-btn-secondary" style="margin-top:14px;">Copy title + hashtags</button>
    </div>
</div>
